<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      sessionStorage.setItem('climb-of-patience:redirect-path', location.pathname + location.search + location.hash);
      location.replace(location.pathname.replace(/\/[^/]*$/, '/') || '/');
    </script>
  </head>
  <body></body>
</html>
